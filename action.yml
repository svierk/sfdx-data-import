name: SFDX Data Import
description: Salesforce import action for uploading records based on CSV (Bulk API 2.0) or JSON (sObject Tree) format.

branding:
  icon: upload-cloud
  color: blue

inputs:
  file-path:
    description: >
      Path to CSV or JSON files that contain the data to be uploaded.
      CSV (Bulk API 2.0) only supports a single file.
      JSON (sObject Tree) supports one or multiple files, comma-separated and in-order that contain the records.
    required: true
  object-type:
    description: >
      API name of the Salesforce object, either standard or custom, that you want to update or delete records from.
      Only required for CSV file based upload using Bulk API 2.0.
    required: false
  external-id:
    description: >
      Name of the external ID field, or the Id field.
      Only required for CSV file based upload using Bulk API 2.0.
    required: false
    default: Id
  target-org:
    description: Username or alias of the target org. Not required if default org is already set.
    required: false
  api-version:
    description: Override the api version used for api requests made by this action, for example '59.0'.
    required: false

runs:
  using: composite
  steps:
    - name: Data Import
      shell: bash
      env:
        FILE_PATH: ${{ inputs.file-path }}
        OBJECT_TYPE: ${{ inputs.object-type }}
        EXTERNAL_ID: ${{ inputs.external-id }}
        TARGET_ORG: ${{ inputs.target-org }}
        API_VERSION: ${{ inputs.api-version }}
      run: |
        set -euo pipefail

        # Determine the file extension from the first file (CSV is single-file,
        # JSON may be a comma-separated list that shares the same extension).
        first_file="${FILE_PATH%%,*}"
        filename_with_ext=$(basename "$first_file")
        extension="${filename_with_ext##*.}"
        extension="${extension,,}"

        args=()

        if [[ -n "$TARGET_ORG" ]]; then
          args+=(--target-org "$TARGET_ORG")
        fi

        if [[ -n "$API_VERSION" ]]; then
          args+=(--api-version "$API_VERSION")
        fi

        case "$extension" in
          csv)
            if [[ -z "$OBJECT_TYPE" ]]; then
              echo "::error::CSV upload (Bulk API 2.0) requires the 'object-type' input."
              exit 1
            fi
            args+=(--sobject "$OBJECT_TYPE")
            args+=(--external-id "$EXTERNAL_ID")
            sf data upsert bulk --file "$FILE_PATH" "${args[@]}"
            ;;
          json)
            sf data import tree --files "$FILE_PATH" "${args[@]}"
            ;;
          *)
            echo "::error::Unsupported file extension '.$extension'. Only .csv (Bulk API 2.0) and .json (sObject Tree) are supported."
            exit 1
            ;;
        esac
